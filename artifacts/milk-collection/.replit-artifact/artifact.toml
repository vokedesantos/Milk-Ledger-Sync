kind = "web"
previewPath = "/"
title = "Milk Collection System"
version = "1.0.0"
id = "artifacts/milk-collection"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21666

[services.development]
run = "pnpm --filter @workspace/milk-collection run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/milk-collection", "run", "build" ]
publicDir = "artifacts/milk-collection/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21666"
BASE_PATH = "/"
